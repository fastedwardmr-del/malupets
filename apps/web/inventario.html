<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Inventario | Malupets</title><link rel="stylesheet" href="css/styles.css">
  <style>
    .inventory-shell{display:grid;grid-template-columns:360px 1fr;gap:18px;align-items:start}.toolbar{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:14px}.product-grid{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:14px}.product-card{border:1px solid #e8eef7;border-radius:18px;background:#fff;padding:12px;display:flex;flex-direction:column;gap:8px}.product-img{height:120px;border-radius:14px;background:#f1f5f9;display:flex;align-items:center;justify-content:center;overflow:hidden;font-size:34px}.product-img img{width:100%;height:100%;object-fit:cover}.muted{color:#64748b;font-size:13px}.price{font-size:20px;font-weight:800;color:#0f172a}.mini-actions{display:flex;gap:8px;flex-wrap:wrap}.modal{position:fixed;inset:0;background:rgba(15,23,42,.38);display:none;align-items:center;justify-content:center;padding:20px;z-index:20}.modal.show{display:flex}.modal-card{background:#fff;border-radius:24px;width:min(760px,100%);box-shadow:0 22px 70px rgba(15,23,42,.2);padding:22px}.modal-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px}.close{border:0;background:#f1f5f9;border-radius:12px;width:38px;height:38px;cursor:pointer}.form-grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:12px}.full{grid-column:1/-1}.actions{display:flex;justify-content:flex-end;gap:10px;margin-top:14px}.toast{position:fixed;right:22px;bottom:22px;background:#071124;color:#fff;padding:14px 18px;border-radius:16px;display:none;z-index:30}.toast.show{display:block}@media(max-width:1050px){.inventory-shell{grid-template-columns:1fr}.product-grid{grid-template-columns:1fr}.form-grid{grid-template-columns:1fr}}
  </style>
</head>
<body>
<div class="app"><aside class="sidebar"><div class="brand"><span class="malu">Malu</span><span class="dog-dot">🐶</span><span class="pets">Pets</span></div><nav class="nav"><a href="dashboard.html">Dashboard</a><a href="pos.html">POS - Facturación</a><a href="clientes.html">Clientes</a><a href="mascotas.html">Mascotas</a><a class="active" href="inventario.html">Inventario</a><a href="agenda.html">Agenda</a><a href="caja.html">Caja</a><a href="reportes.html">Reportes</a><a href="configuracion.html">Configuración</a></nav></aside>
<main class="main"><div class="topbar"><div class="title"><h1>Inventario</h1><p>Productos, stock, precios, carga desde Excel e imágenes.</p></div><button class="btn btn-blue" onclick="openProductModal()">+ Producto</button></div>
<section class="inventory-shell"><div class="card"><h3>Carga rápida</h3><p class="muted">Excel con columnas: sku, name, category, description, cost_price, sale_price, stock, unit.</p><input id="excelFile" class="input" type="file" accept=".xlsx,.xls,.csv"><div class="actions"><button class="btn btn-green" onclick="importExcel()">Importar Excel</button></div><hr><h3>Buscar</h3><input id="search" class="input" placeholder="Buscar por nombre, SKU o categoría" oninput="renderProducts()"><select id="statusFilter" class="select" onchange="renderProducts()"><option value="active">Solo activos</option><option value="all">Todos</option></select></div><div class="card"><div class="toolbar"><button class="btn btn-soft" onclick="loadProducts()">Actualizar</button></div><div id="productGrid" class="product-grid"></div></div></section></main></div>
<div id="productModal" class="modal"><div class="modal-card"><div class="modal-head"><h3 id="modalTitle">Nuevo producto</h3><button class="close" onclick="closeModal()">×</button></div><div class="form-grid"><input id="product_id" type="hidden"><input id="sku" class="input" placeholder="SKU / Código"><input id="name" class="input" placeholder="Nombre *"><input id="category" class="input" placeholder="Categoría"><input id="unit" class="input" placeholder="Unidad" value="UND"><input id="cost_price" class="input" type="number" step="0.01" placeholder="Precio costo"><input id="sale_price" class="input" type="number" step="0.01" placeholder="Precio venta"><input id="stock" class="input" type="number" step="0.01" placeholder="Stock"><select id="is_active" class="select"><option value="1">Activo</option><option value="0">Inactivo</option></select><textarea id="description" class="full" placeholder="Descripción"></textarea></div><div class="actions"><button class="btn btn-soft" onclick="closeModal()">Cancelar</button><button class="btn btn-blue" onclick="saveProduct()">Guardar</button></div></div></div>
<div id="toast" class="toast"></div>
<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script><script src="js/config.js"></script><script src="js/app.js"></script>
<script>
let products=[];function money(v){return new Intl.NumberFormat('es-CO',{style:'currency',currency:'COP',maximumFractionDigits:0}).format(Number(v||0))}function showToast(m){toast.textContent=m;toast.classList.add('show');setTimeout(()=>toast.classList.remove('show'),2500)}function escapeHtml(v){return String(v??'').replace(/[&<>'"]/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;',"'":'&#39;','"':'&quot;'}[m]))}
async function loadProducts(){const data=await Malu.api('/api/products');products=Array.isArray(data)?data:[];renderProducts()}function renderProducts(){const q=(search.value||'').toLowerCase().trim();const onlyActive=statusFilter.value==='active';const list=products.filter(p=>(!onlyActive||Number(p.is_active)===1)&&`${p.name} ${p.sku||''} ${p.category||''}`.toLowerCase().includes(q));productGrid.innerHTML=list.map(p=>`<div class="product-card"><div class="product-img">${p.image_url?`<img src="${p.image_url}">`:'🛍️'}</div><strong>${escapeHtml(p.name)}</strong><span class="muted">${escapeHtml(p.sku||'Sin SKU')} · ${escapeHtml(p.category||'Sin categoría')}</span><div class="price">${money(p.sale_price)}</div><span class="muted">Stock: ${escapeHtml(p.stock??0)} ${escapeHtml(p.unit||'UND')}</span><div class="mini-actions"><button class="btn btn-soft" onclick="editProduct(${p.id})">Editar</button><label class="btn btn-dark">Imagen<input type="file" accept="image/*" style="display:none" onchange="uploadImage(${p.id},this.files[0])"></label></div></div>`).join('')||'<p class="muted">No hay productos.</p>'}
function openProductModal(){clearForm();modalTitle.textContent='Nuevo producto';productModal.classList.add('show')}function closeModal(){productModal.classList.remove('show')}function editProduct(id){const p=products.find(x=>Number(x.id)===Number(id));if(!p)return;modalTitle.textContent='Editar producto';product_id.value=p.id;sku.value=p.sku||'';name.value=p.name||'';category.value=p.category||'';description.value=p.description||'';cost_price.value=p.cost_price||0;sale_price.value=p.sale_price||0;stock.value=p.stock||0;unit.value=p.unit||'UND';is_active.value=String(p.is_active??1);productModal.classList.add('show')}
function clearForm(){['product_id','sku','name','category','description','cost_price','sale_price','stock'].forEach(id=>document.getElementById(id).value='');unit.value='UND';is_active.value='1'}async function saveProduct(){const body={sku:sku.value,name:name.value.trim(),category:category.value,description:description.value,cost_price:Number(cost_price.value||0),sale_price:Number(sale_price.value||0),stock:Number(stock.value||0),unit:unit.value||'UND',is_active:Number(is_active.value)};if(!body.name)return showToast('El nombre es obligatorio');const id=product_id.value;const res=await Malu.api(id?`/api/products/${id}`:'/api/products',{method:id?'PUT':'POST',body:JSON.stringify(body)});if(res.ok){closeModal();showToast(res.message||'Guardado');await loadProducts()}else showToast(res.error||'No se pudo guardar')}
async function uploadImage(id,file){if(!file)return;const fd=new FormData();fd.append('image',file);const res=await Malu.api(`/api/products/${id}/image`,{method:'POST',body:fd});if(res.ok){showToast('Imagen cargada');await loadProducts()}else showToast(res.error||'No se pudo subir imagen')}
async function importExcel(){const file=excelFile.files[0];if(!file)return showToast('Selecciona un Excel');const buffer=await file.arrayBuffer();const wb=XLSX.read(buffer,{type:'array'});const ws=wb.Sheets[wb.SheetNames[0]];const rows=XLSX.utils.sheet_to_json(ws,{defval:''});const res=await Malu.api('/api/products/import',{method:'POST',body:JSON.stringify({rows})});if(res.ok){showToast(`Importado: ${res.created} nuevos, ${res.updated} actualizados`);excelFile.value='';await loadProducts()}else showToast(res.error||'No se pudo importar')}
loadProducts();
</script></body></html>
