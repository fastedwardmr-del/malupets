<!doctype html><html lang="es"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>POS | Malupets</title><link rel="stylesheet" href="css/styles.css"><style>.pos-shell{display:grid;grid-template-columns:1fr 420px;gap:18px;align-items:start}.product-list{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:12px}.p-card{border:1px solid #e8eef7;border-radius:16px;background:#fff;padding:12px;cursor:pointer}.p-card:hover{border-color:#00a6e8;background:#eef9ff}.p-card strong{display:block}.muted{color:#64748b;font-size:13px}.price{font-size:18px;font-weight:800}.cart-row{display:grid;grid-template-columns:1fr 76px 92px 34px;gap:8px;align-items:center;border-bottom:1px solid #e8eef7;padding:10px 0}.qty{display:flex;gap:4px;align-items:center}.qty button{width:24px;height:24px;border:0;border-radius:8px}.total-box{background:#071124;color:#fff;border-radius:18px;padding:18px;margin-top:14px}.total-box h2{margin:0;font-size:32px}.toast{position:fixed;right:22px;bottom:22px;background:#071124;color:#fff;padding:14px 18px;border-radius:16px;display:none}.toast.show{display:block}@media(max-width:1080px){.pos-shell{grid-template-columns:1fr}.product-list{grid-template-columns:1fr}}</style></head><body><div class="app"><aside class="sidebar"><div class="brand"><span class="malu">Malu</span><span class="dog-dot">🐶</span><span class="pets">Pets</span></div><nav class="nav"><a href="dashboard.html">Dashboard</a><a class="active" href="pos.html">POS - Facturación</a><a href="clientes.html">Clientes</a><a href="mascotas.html">Mascotas</a><a href="inventario.html">Inventario</a><a href="agenda.html">Agenda</a><a href="caja.html">Caja</a><a href="reportes.html">Reportes</a><a href="configuracion.html">Configuración</a></nav></aside><main class="main"><div class="topbar"><div class="title"><h1>POS - Facturación</h1><p>Busca productos, arma el carrito y registra la venta.</p></div></div><section class="pos-shell"><div class="card"><div class="row"><input id="search" class="input" placeholder="Buscar producto por nombre o SKU" oninput="renderProducts()"><button class="btn btn-soft" onclick="loadData()">Actualizar</button></div><div id="productList" class="product-list" style="margin-top:14px"></div></div><div class="card"><h3>Venta actual</h3><select id="customer_id" class="select"></select><select id="payment_method" class="select"><option>Efectivo</option><option>Transferencia</option><option>Tarjeta</option><option>Nequi/Daviplata</option></select><div id="cartRows"></div><textarea id="notes" placeholder="Notas de la venta"></textarea><div class="total-box"><span>Total</span><h2 id="totalText">$0</h2></div><div class="actions"><button class="btn btn-soft" onclick="clearCart()">Limpiar</button><button class="btn btn-green" onclick="finishSale()">Finalizar venta</button></div></div></section></main></div><div id="toast" class="toast"></div><script src="js/config.js"></script><script src="js/app.js"></script><script>let products=[],customers=[],cart=[];function money(v){return new Intl.NumberFormat('es-CO',{style:'currency',currency:'COP',maximumFractionDigits:0}).format(Number(v||0))}function showToast(m){toast.textContent=m;toast.classList.add('show');setTimeout(()=>toast.classList.remove('show'),2500)}function escapeHtml(v){return String(v??'').replace(/[&<>'"]/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;',"'":'&#39;','"':'&quot;'}[m]))}async function loadData(){const [p,c]=await Promise.all([Malu.api('/api/products?active=1'),Malu.api('/api/customers')]);products=Array.isArray(p)?p:[];customers=Array.isArray(c)?c:[];customer_id.innerHTML='<option value="">Cliente ocasional</option>'+customers.map(x=>`<option value="${x.id}">${escapeHtml(x.full_name)}</option>`).join('');renderProducts();renderCart()}function renderProducts(){const q=(search.value||'').toLowerCase().trim();const list=products.filter(p=>`${p.name} ${p.sku||''}`.toLowerCase().includes(q));productList.innerHTML=list.map(p=>`<div class="p-card" onclick="addToCart(${p.id})"><strong>${escapeHtml(p.name)}</strong><span class="muted">${escapeHtml(p.sku||'Sin SKU')} · Stock ${escapeHtml(p.stock??0)}</span><div class="price">${money(p.sale_price)}</div></div>`).join('')||'<p class="muted">No hay productos activos.</p>'}function addToCart(id){const p=products.find(x=>Number(x.id)===Number(id));if(!p)return;const item=cart.find(x=>Number(x.product_id)===Number(id));if(item){if(item.quantity+1>Number(p.stock))return showToast('Stock insuficiente');item.quantity++}else{if(Number(p.stock)<=0)return showToast('Sin stock');cart.push({product_id:p.id,name:p.name,unit_price:Number(p.sale_price||0),quantity:1,stock:Number(p.stock||0)})}renderCart()}function changeQty(id,delta){const item=cart.find(x=>Number(x.product_id)===Number(id));if(!item)return;const n=item.quantity+delta;if(n<=0){cart=cart.filter(x=>Number(x.product_id)!==Number(id));return renderCart()}if(n>item.stock)return showToast('Stock insuficiente');item.quantity=n;renderCart()}function renderCart(){cartRows.innerHTML=cart.map(i=>`<div class="cart-row"><div><strong>${escapeHtml(i.name)}</strong><br><span class="muted">${money(i.unit_price)}</span></div><div class="qty"><button onclick="changeQty(${i.product_id},-1)">-</button><strong>${i.quantity}</strong><button onclick="changeQty(${i.product_id},1)">+</button></div><strong>${money(i.quantity*i.unit_price)}</strong><button class="close" onclick="changeQty(${i.product_id},-${i.quantity})">×</button></div>`).join('')||'<p class="muted">Carrito vacío.</p>';totalText.textContent=money(cart.reduce((s,i)=>s+i.quantity*i.unit_price,0))}function clearCart(){cart=[];renderCart()}async function finishSale(){if(!cart.length)return showToast('Agrega productos');const res=await Malu.api('/api/sales',{method:'POST',body:JSON.stringify({customer_id:customer_id.value||null,payment_method:payment_method.value,notes:notes.value,items:cart})});if(res.ok){showToast(`Venta ${res.invoice_number} registrada`);cart=[];notes.value='';await loadData()}else showToast(res.error||'No se pudo finalizar la venta')}loadData();</script></body></html>
