<!doctype html><html lang="es"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Clientes</title><link rel="stylesheet" href="css/styles.css"></head><body><div class="app"><aside class="sidebar"><div class="brand"><span class="malu">Malu</span><span class="dog-dot">🐶</span><span class="pets">Pets</span></div><nav class="nav"><a href="dashboard.html">Dashboard</a><a href="pos.html">POS - Facturación</a><a class="active" href="clientes.html">Clientes</a><a href="mascotas.html">Mascotas</a><a href="inventario.html">Inventario</a><a href="agenda.html">Agenda</a><a href="caja.html">Caja</a><a href="reportes.html">Reportes</a><a href="configuracion.html">Configuración</a></nav></aside><main class="main"><div class="topbar"><div class="title"><h1>Clientes</h1><p>Administra propietarios y sus mascotas.</p></div></div><section class="grid layout-2"><div class="card"><h3>Nuevo cliente</h3><div class="form"><input id="full_name" class="input" placeholder="Nombre completo"><input id="phone" class="input" placeholder="Teléfono"><input id="email" class="input" placeholder="Correo"><input id="city" class="input" placeholder="Ciudad"><textarea id="notes" placeholder="Notas"></textarea><button class="btn btn-blue" onclick="crearCliente()">Guardar cliente</button><div id="msg" class="notice" style="display:none"></div></div></div><div class="card"><h3>Listado</h3><table class="table"><thead><tr><th>Cliente</th><th>Teléfono</th><th>Ciudad</th></tr></thead><tbody id="rows"></tbody></table></div></section></main></div><script src="js/config.js"></script><script src="js/app.js"></script><script>async function cargar(){const data=await Malu.api('/api/customers');rows.innerHTML=data.map(x=>`<tr><td>${x.full_name}</td><td>${x.phone||''}</td><td>${x.city||''}</td></tr>`).join('')||'<tr><td colspan="3">Sin clientes</td></tr>'}async function crearCliente(){const body={full_name:full_name.value,phone:phone.value,email:email.value,city:city.value,notes:notes.value};const r=await Malu.api('/api/customers',{method:'POST',body:JSON.stringify(body)});msg.style.display='block';msg.textContent=r.message||r.error;if(r.ok){full_name.value=phone.value=email.value=city.value=notes.value='';cargar();}}cargar();</script></body></html>
