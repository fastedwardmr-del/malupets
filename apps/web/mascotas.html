<!doctype html><html lang="es"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Mascotas</title><link rel="stylesheet" href="css/styles.css"></head><body><div class="app"><aside class="sidebar"><div class="brand"><span class="malu">Malu</span><span class="dog-dot">🐶</span><span class="pets">Pets</span></div><nav class="nav"><a href="dashboard.html">Dashboard</a><a href="pos.html">POS - Facturación</a><a href="clientes.html">Clientes</a><a class="active" href="mascotas.html">Mascotas</a><a href="inventario.html">Inventario</a><a href="agenda.html">Agenda</a><a href="caja.html">Caja</a><a href="reportes.html">Reportes</a><a href="configuracion.html">Configuración</a></nav></aside><main class="main"><div class="topbar"><div class="title"><h1>Mascotas</h1><p>Registra varias mascotas por cliente.</p></div></div><section class="grid layout-2"><div class="card"><h3>Nueva mascota</h3><div class="form"><select id="customer_id" class="select"></select><input id="name" class="input" placeholder="Nombre de la mascota"><div class="row"><input id="species" class="input" placeholder="Especie"><input id="breed" class="input" placeholder="Raza"></div><div class="row"><input id="sex" class="input" placeholder="Sexo"><input id="weight" class="input" type="number" placeholder="Peso"></div><textarea id="notes" placeholder="Notas"></textarea><button class="btn btn-blue" onclick="crearMascota()">Guardar mascota</button><div id="msg" class="notice" style="display:none"></div></div></div><div class="card"><h3>Listado</h3><table class="table"><thead><tr><th>Mascota</th><th>Dueño</th><th>Especie</th></tr></thead><tbody id="rows"></tbody></table></div></section></main></div><script src="js/config.js"></script><script src="js/app.js"></script><script>async function cargarClientes(){const c=await Malu.api('/api/customers');customer_id.innerHTML='<option value="">Seleccione cliente</option>'+c.map(x=>`<option value="${x.id}">${x.full_name}</option>`).join('')}async function cargar(){const data=await Malu.api('/api/pets');rows.innerHTML=data.map(x=>`<tr><td>${x.name}</td><td>${x.owner||''}</td><td>${x.species||''}</td></tr>`).join('')||'<tr><td colspan="3">Sin mascotas</td></tr>'}async function crearMascota(){const body={customer_id:customer_id.value,name:name.value,species:species.value,breed:breed.value,sex:sex.value,weight:weight.value,notes:notes.value};const r=await Malu.api('/api/pets',{method:'POST',body:JSON.stringify(body)});msg.style.display='block';msg.textContent=r.message||r.error;if(r.ok){name.value=species.value=breed.value=sex.value=weight.value=notes.value='';cargar();}}cargarClientes();cargar();</script></body></html>
