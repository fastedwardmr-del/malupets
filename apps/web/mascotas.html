<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Mascotas | Malupets</title><link rel="stylesheet" href="css/styles.css">
  <style>.layout-2{grid-template-columns:380px 1fr}.actions-row{display:flex;gap:8px;flex-wrap:wrap}.btn-mini{border:0;border-radius:999px;padding:7px 10px;font-size:12px;font-weight:700;cursor:pointer;background:#f1f5f9;color:#0f172a}.notice{margin-top:12px}.muted{color:#64748b;font-size:12px}@media(max-width:980px){.layout-2{grid-template-columns:1fr}}</style>
</head>
<body>
<div class="app"><aside class="sidebar"><div class="brand"><span class="malu">Malu</span><span class="dog-dot">🐶</span><span class="pets">Pets</span></div><nav class="nav"><a href="dashboard.html">Dashboard</a><a href="pos.html">POS - Facturación</a><a href="clientes.html">Clientes</a><a class="active" href="mascotas.html">Mascotas</a><a href="inventario.html">Inventario</a><a href="agenda.html">Agenda</a><a href="caja.html">Caja</a><a href="reportes.html">Reportes</a><a href="configuracion.html">Configuración</a></nav></aside><main class="main"><div class="topbar"><div class="title"><h1>Mascotas</h1><p>Registra, lista y edita mascotas por cliente.</p></div></div><section class="grid layout-2"><div class="card"><h3 id="formTitle">Nueva mascota</h3><div class="form"><select id="customer_id" class="select"></select><input id="pet_name" class="input" placeholder="Nombre de la mascota *"><div class="row"><select id="species" class="input"><option value="Perro">Perro</option><option value="Gato">Gato</option><option value="Ave">Ave</option><option value="Conejo">Conejo</option><option value="Otro">Otro</option></select><input id="breed" class="input" placeholder="Raza"></div><div class="row"><select id="sex" class="input"><option value="">Sexo</option><option value="Macho">Macho</option><option value="Hembra">Hembra</option></select><input id="weight" class="input" type="number" step="0.1" placeholder="Peso kg"></div><div class="row"><input id="color" class="input" placeholder="Color"><input id="birth_date" class="input" type="date" placeholder="Fecha nacimiento"></div><input id="microchip" class="input" placeholder="Microchip"><textarea id="allergies" placeholder="Alergias"></textarea><textarea id="notes" placeholder="Notas"></textarea><div class="actions-row"><button class="btn btn-blue" onclick="guardarMascota()">Guardar mascota</button><button id="cancelEditBtn" class="btn btn-soft" style="display:none" onclick="cancelarEdicion()">Cancelar edición</button></div><div id="msg" class="notice" style="display:none"></div></div></div><div class="card"><h3>Listado</h3><table class="table"><thead><tr><th>Mascota</th><th>Dueño</th><th>Especie</th><th>Acciones</th></tr></thead><tbody id="rows"></tbody></table></div></section></main></div>
<script src="js/config.js"></script><script src="js/app.js"></script>
<script>
let customers=[], pets=[], editingPetId=null;
function escapeHtml(v){return String(v??'').replace(/[&<>'"]/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;',"'":'&#39;','"':'&quot;'}[m]));}
function showMsg(text){msg.style.display='block';msg.textContent=text;}
async function cargarClientes(){customers=await Malu.api('/api/customers');customer_id.innerHTML='<option value="">Seleccione cliente</option>'+customers.map(x=>`<option value="${x.id}">${escapeHtml(x.full_name)}</option>`).join('')}
async function cargar(){pets=await Malu.api('/api/pets');rows.innerHTML=pets.map(x=>`<tr><td><strong>${escapeHtml(x.name)}</strong>${x.breed?`<div class="muted">${escapeHtml(x.breed)}</div>`:''}</td><td>${escapeHtml(x.owner||'')}</td><td>${escapeHtml(x.species||'')}</td><td><button class="btn-mini" onclick="editarMascota(${x.id})">Editar</button></td></tr>`).join('')||'<tr><td colspan="4">Sin mascotas</td></tr>'}
function editarMascota(id){const p=pets.find(x=>Number(x.id)===Number(id));if(!p)return showMsg('Mascota no encontrada');editingPetId=id;formTitle.textContent='Editar mascota';cancelEditBtn.style.display='inline-block';customer_id.value=p.customer_id||'';pet_name.value=p.name||'';species.value=p.species||'';breed.value=p.breed||'';sex.value=p.sex||'';weight.value=p.weight||'';color.value=p.color||'';birth_date.value=p.birth_date||'';microchip.value=p.microchip||'';allergies.value=p.allergies||'';notes.value=p.notes||'';pet_name.focus();}
function cancelarEdicion(){editingPetId=null;formTitle.textContent='Nueva mascota';cancelEditBtn.style.display='none';limpiarFormulario();}
function limpiarFormulario(){pet_name.value=breed.value=sex.value=weight.value=color.value=birth_date.value=microchip.value=allergies.value=notes.value='';species.value='Perro';}
async function guardarMascota(){const body={customer_id:customer_id.value,name:pet_name.value.trim(),species:species.value,breed:breed.value.trim(),sex:sex.value,weight:weight.value?Number(weight.value):null,color:color.value.trim(),birth_date:birth_date.value,microchip:microchip.value.trim(),allergies:allergies.value.trim(),notes:notes.value.trim()};if(!body.customer_id)return showMsg('El cliente es obligatorio');if(!body.name)return showMsg('El nombre de la mascota es obligatorio');const url=editingPetId?`/api/pets/${editingPetId}`:'/api/pets';const method=editingPetId?'PUT':'POST';const r=await Malu.api(url,{method,body:JSON.stringify(body)});showMsg(r.message||r.error);if(r.ok){cancelarEdicion();await cargar();}}
cargarClientes();cargar();
</script></body></html>
